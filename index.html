<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>0xDefalt | Alpha & Automation</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://0x-defalt.github.io/" />
  <meta property="og:title" content="0xDefalt — Alpha, Automação & Web3" />
  <meta property="og:description" content="Content Creator · Builder · Dev. Explorador da Automação, Análise de Sentimentos e Previsões na Polymarket. Transformando Dados em Lucro Real." />
  <meta property="og:image" content="https://0x-defalt.github.io/profile.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@0xDefalt" />
  <meta name="twitter:title" content="0xDefalt — Alpha, Automação & Web3" />
  <meta name="twitter:description" content="Content Creator · Builder · Dev. Explorador da Automação, Análise de Sentimentos e Previsões na Polymarket." />
  <meta name="twitter:image" content="https://0x-defalt.github.io/profile.jpg" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  
  <style>
    :root {
      --neon: #00ff9d;
      --bg: #050505;
      --card-bg: #111111;
      --text: #ffffff;
      --dim-text: #888888;
      --font-header: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; scroll-behavior: smooth; }
    body { 
      margin: 0; font-family: var(--font-body); 
      background: var(--bg); color: var(--text); line-height: 1.6;
      overflow-x: hidden;
    }
    #particles-js { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      z-index: -1; opacity: 0.4;
    }
    @keyframes fadeInSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow {
      0% { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }
      50% { text-shadow: 0 0 25px rgba(0, 255, 157, 0.8), 0 0 40px rgba(0, 255, 157, 0.3); }
      100% { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }
    }
    .animate-entry { animation: fadeInSlide 0.8s ease-out forwards; opacity: 0; }
    header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
    nav { max-width: 1100px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: -1px; text-transform: uppercase; font-family: var(--font-header); color: var(--text); text-decoration: none; }
    .logo:hover { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
    .nav-links a { color: var(--dim-text); text-decoration: none; margin-left: 25px; font-size: 0.9rem; transition: 0.3s; font-family: var(--font-header); font-weight: 500; }
    .nav-links a:hover { color: var(--neon); }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    .hero { padding: 150px 0 80px; display: flex; align-items: center; gap: 50px; }
    .hero-content { flex: 1; }
    .hero-content h1 { font-size: 3.5rem; line-height: 1.1; margin: 0 0 20px; font-weight: 700; font-family: var(--font-header); text-transform: uppercase; animation: pulseGlow 3s infinite; }
    .hero-content p { font-size: 1.2rem; color: var(--dim-text); margin-bottom: 30px; }
    .profile-wrapper { position: relative; width: 300px; height: 300px; flex-shrink: 0; transition: transform 0.1s ease-out; }
    .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; border: 1px solid #333; transition: 0.5s; }
    .profile-wrapper:hover .profile-img { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,157,0.3); animation: glitch 0.6s infinite; }
    @keyframes glitch { /* glitch keyframes mantidos */ }
    .profile-wrapper::after { content: ""; position: absolute; top: 15px; left: 15px; width: 100%; height: 100%; border: 2px solid var(--neon); border-radius: 20px; z-index: -1; opacity: 0.3; }
    .section-title { font-size: 0.8rem; text-transform: uppercase; color: var(--neon); letter-spacing: 3px; margin-bottom: 40px; display: block; font-family: var(--font-header); font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 100px; }
    .card { background: var(--card-bg); border: 1px solid #222; padding: 30px; border-radius: 12px; transition: 0.3s; text-decoration: none; color: inherit; }
    .card:hover { border-color: var(--neon); transform: translateY(-8px); box-shadow: 0 5px 20px rgba(0,255,157,0.1); }
    .card h3 { margin: 0 0 10px; font-size: 1.3rem; font-family: var(--font-header); font-weight: 700; }
    .card p { color: var(--dim-text); margin: 0; font-size: 0.95rem; }
    .btn-main { display: inline-block; background: var(--neon); color: #000; padding: 15px 35px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: 0.3s; font-family: var(--font-header); font-size: 0.9rem; text-transform: uppercase; }
    .btn-main:hover { box-shadow: 0 0 30px rgba(0,255,157,0.5); transform: scale(1.05); }
    footer { padding: 50px 0; border-top: 1px solid #222; color: #444; font-size: 0.8rem; text-align: center; font-family: var(--font-header); }
    .footer-twitter { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; color: var(--neon); text-decoration: none; font-family: var(--font-header); font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; border: 1px solid rgba(0,255,157,0.3); padding: 8px 20px; border-radius: 6px; transition: 0.3s; }
    .footer-twitter:hover { background: rgba(0,255,157,0.08); border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,157,0.2); }
    .error-card { color: #ff5050 !important; text-align: center; }
    @media (max-width: 850px) { .hero { flex-direction: column-reverse; text-align: center; padding-top: 100px; } .hero-content h1 { font-size: 2.2rem; } .profile-wrapper { width: 200px; height: 200px; margin: 0 auto; } }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <header>
    <nav>
      <a href="#" class="logo">0xDefalt</a>
      <div class="nav-links">
        <a href="#about">Sobre</a>
        <a href="#alpha">Alpha</a>
        <a href="#links">Links</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero" id="about"> ... (mesmo conteúdo do hero, alpha, links, produtividade) ... </section>

    <section id="polymarket-live" class="animate-entry" style="animation-delay: 0.7s; margin-bottom: 100px;">
        <span class="section-title">Polymarket — Mercados em Alta</span>
        <div id="poly-grid" class="grid">
          <div class="card" style="color: var(--dim-text); font-size:0.9rem;">Carregando mercados ao vivo...</div>
        </div>
    </section>
    <!-- resto das seções igual -->
  </main>

  <footer> ... mesmo footer ... </footer>

  <script>
    particlesJS("particles-js", { /* mesmo particles */ });

    let allMarkets = [];
    let idx = 0;

    async function loadMarkets(retry = 0) {
      const grid = document.getElementById('poly-grid');
      grid.innerHTML = '<div class="card" style="color: var(--dim-text);">Carregando mercados ao vivo...</div>';

      try {
        const res = await fetch('https://polymarket-proxy2.dinrildotcom.workers.dev/', { cache: 'no-store' });
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        allMarkets = data.filter(m => {
          if (!m.question || !m.outcomePrices || !m.slug) return false;
          if (m.question.toLowerCase().includes('did not forecast')) return false;
          if (m.active === false || m.closed === true) return false;
          const prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
          if (!prices || prices.length < 2) return false;
          const yes = Math.round(parseFloat(prices[0]) * 100);
          return yes >= 5 && yes <= 95;   // ← filtro mais flexível (antes era 10-90)
        });

        if (!allMarkets.length) {
          grid.innerHTML = `<div class="card"><p style="color:var(--dim-text);">Nenhum mercado equilibrado no momento (tente novamente).</p></div>`;
          return;
        }

        renderCards();
      } catch (e) {
        console.error("Polymarket Error:", e);
        grid.innerHTML = `
          <div class="card error-card">
            <p>Mercados indisponíveis no momento.</p>
            <p style="font-size:0.8rem; margin-top:8px;">Erro: ${e.message}</p>
            <button onclick="loadMarkets(1)" style="margin-top:12px; padding:8px 16px; background:#ff5050; color:#000; border:none; border-radius:6px; cursor:pointer;">🔄 Tentar novamente</button>
          </div>`;
      }
    }

    function renderCards() {
      const grid = document.getElementById('poly-grid');
      const count = Math.min(3, allMarkets.length);
      const three = Array.from({length: count}, (_, i) => allMarkets[(idx + i) % allMarkets.length]);

      grid.style.opacity = '0';
      setTimeout(() => {
        grid.innerHTML = '';
        three.forEach(m => {
          const prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
          const yes = Math.round(parseFloat(prices[0]) * 100);
          const vol = parseFloat(m.volume || 0);
          const fvol = vol >= 1e6 ? '$' + (vol/1e6).toFixed(1) + 'M' : vol >= 1e3 ? '$' + (vol/1e3).toFixed(0) + 'K' : '$' + vol.toFixed(0);

          const el = document.createElement('a');
          el.className = 'card';
          el.href = 'https://polymarket.com/event/' + m.slug;
          el.target = '_blank';
          el.rel = 'noopener';
          el.innerHTML = `
            <h3 style="font-size:0.95rem;line-height:1.4;margin-bottom:12px;">${m.question}</h3>
            <div style="display:flex;gap:8px;margin-bottom:10px;">
              <span style="color:var(--neon);font-size:0.85rem;font-weight:700;">Sim ${yes}%</span>
              <span style="color:#ff5050;font-size:0.85rem;font-weight:700;">Não ${100-yes}%</span>
            </div>
            <div style="background:#1a1a1a;border-radius:4px;height:4px;overflow:hidden;margin-bottom:10px;">
              <div style="width:${yes}%;height:100%;background:var(--neon);border-radius:4px;"></div>
            </div>
            <div style="font-size:0.78rem;color:var(--dim-text);">Volume: <span style="color:var(--neon);font-weight:700;">${fvol}</span></div>`;
          grid.appendChild(el);
        });
        grid.style.transition = 'opacity 0.5s';
        grid.style.opacity = '1';
        idx = (idx + 3) % allMarkets.length;
      }, 400);
    }

    // Inicia
    loadMarkets();

    // Atualiza preços reais a cada 40s + rotação a cada 5s
    setInterval(() => loadMarkets(), 40000);
    setInterval(() => { if (allMarkets.length) renderCards(); }, 5000);

    // Parallax
    window.addEventListener('scroll', function() {
      const scrolled = window.pageYOffset;
      const profile = document.querySelector('.profile-wrapper');
      if (scrolled < 300) profile.style.transform = `translateY(${scrolled * 0.2}px)`;
    });
  </script>
</body>
</html>
