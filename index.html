<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>0xDefalt | Alpha & Automation</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Open Graph / Link Preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://0x-defalt.github.io/" />
  <meta property="og:title"       content="0xDefalt — Alpha, Automação & Web3" />
  <meta property="og:description" content="Content Creator · Builder · Dev. Explorador da Automação, Análise de Sentimentos e Previsões na Polymarket. Transformando Dados em Lucro Real." />
  <meta property="og:image"       content="https://0x-defalt.github.io/profile.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@0xDefalt" />
  <meta name="twitter:title"       content="0xDefalt — Alpha, Automação & Web3" />
  <meta name="twitter:description" content="Content Creator · Builder · Dev. Explorador da Automação, Análise de Sentimentos e Previsões na Polymarket." />
  <meta name="twitter:image"       content="https://0x-defalt.github.io/profile.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  
  <style>
    :root {
      --neon: #00ff9d;
      --bg: #050505;
      --card-bg: #111111;
      --text: #ffffff;
      --dim-text: #888888;
      --font-header: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --red-chance: #ff5050;
      --green-chance: #00ff9d;
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }
    body { 
      margin: 0; font-family: var(--font-body); 
      background: var(--bg); color: var(--text); line-height: 1.6;
      overflow-x: hidden;
    }

    /* PARTICULAS NO FUNDO */
    #particles-js { 
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%; 
      z-index: -1;
      opacity: 0.4;
    }

    /* KEYFRAMES PARA ANIMACOES */
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0% { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }
      50% { text-shadow: 0 0 25px rgba(0, 255, 157, 0.8), 0 0 40px rgba(0, 255, 157, 0.3); }
      100% { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }
    }

    .animate-entry {
      animation: fadeInSlide 0.8s ease-out forwards;
      opacity: 0;
    }

    /* HEADER FIXO */
    header {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      animation: fadeInSlide 0.5s ease-out;
    }
    nav {
      max-width: 1100px; margin: 0 auto; padding: 10px 20px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { 
        font-weight: 700; font-size: 1.5rem; letter-spacing: -1px; 
        text-transform: uppercase; font-family: var(--font-header);
        color: var(--text); text-decoration: none;
        transition: 0.3s;
    }
    .logo:hover { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
    .nav-links a { 
        color: var(--dim-text); text-decoration: none; 
        margin-left: 25px; font-size: 0.9rem; 
        transition: 0.3s; font-family: var(--font-header);
        font-weight: 500;
    }
    .nav-links a:hover { color: var(--neon); }

    /* Slider de topo */
    .ticker-bar {
      max-width: 1100px; margin: 0 auto; padding: 10px 20px 0;
      overflow: hidden;
      background: var(--card-bg);
      border-bottom: 1px solid #222;
      white-space: nowrap;
    }
    .ticker-content {
      display: inline-flex;
      animation: scroll-left 80s linear infinite; /* Mais lento pra ler */
      padding-left: 100%;
    }
    .ticker-bar:hover .ticker-content {
      animation-play-state: paused;
    }
    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .ticker-item {
      display: inline-flex; align-items: center; gap: 6px;
      margin-right: 30px;
      font-size: 0.9rem; font-family: var(--font-header);
      color: var(--dim-text);
      transition: all 0.3s ease;
      padding: 6px 12px; border-radius: 6px;
      background: rgba(0, 255, 157, 0.05);
    }
    .ticker-item:hover {
      background: rgba(0, 255, 157, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
      transform: scale(1.05);
    }
    .ticker-chance {
      font-weight: bold;
    }
    .low-chance { color: var(--red-chance); }
    .high-chance { color: var(--green-chance); }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* SEÇÃO HERO */
    .hero { padding: 220px 0 80px; display: flex; align-items: center; gap: 50px; }

    .hero-content { flex: 1; }
    
    .hero-content h1 { 
      font-size: 3.5rem; line-height: 1.1; margin: 0 0 20px; 
      font-weight: 700; font-family: var(--font-header); text-transform: uppercase;
      animation: pulseGlow 3s infinite;
    }
    .hero-content p { font-size: 1.2rem; color: var(--dim-text); margin-bottom: 30px; }

    .profile-wrapper { 
        position: relative; width: 300px; height: 300px; flex-shrink: 0; 
        transition: transform 0.1s ease-out;
    }
    .profile-img { 
      width: 100%; height: 100%; object-fit: cover; 
      border-radius: 20px; border: 1px solid #333;
      transition: 0.5s;
    }
    .profile-wrapper:hover .profile-img { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); animation: glitch 0.6s infinite; }

    @keyframes glitch {
      0%   { transform: translate(0); filter: none; clip-path: none; }
      10%  { transform: translate(-3px, 1px); filter: hue-rotate(90deg); clip-path: inset(10% 0 80% 0); }
      20%  { transform: translate(3px, -1px); filter: hue-rotate(180deg); clip-path: inset(60% 0 20% 0); }
      30%  { transform: translate(-2px, 2px); filter: hue-rotate(270deg); clip-path: inset(30% 0 50% 0); }
      40%  { transform: translate(0); filter: none; clip-path: none; }
      50%  { transform: translate(4px, -2px); filter: brightness(1.5) saturate(2); clip-path: inset(5% 0 90% 0); }
      60%  { transform: translate(-4px, 1px); filter: hue-rotate(90deg); clip-path: inset(70% 0 10% 0); }
      70%  { transform: translate(2px, -1px); filter: none; clip-path: none; }
      80%  { transform: translate(-2px, 2px); filter: hue-rotate(180deg); clip-path: inset(40% 0 40% 0); }
      90%  { transform: translate(0); filter: none; clip-path: none; }
      100% { transform: translate(0); filter: none; }
    }
    .profile-wrapper::after {
      content: ""; position: absolute; top: 15px; left: 15px; width: 100%; height: 100%;
      border: 2px solid var(--neon); border-radius: 20px; z-index: -1; opacity: 0.3;
    }

    .section-title { 
        font-size: 0.8rem; text-transform: uppercase; color: var(--neon); 
        letter-spacing: 3px; margin-bottom: 40px; display: block; 
        font-family: var(--font-header); font-weight: 700;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 100px; }
    .card { 
      background: var(--card-bg); border: 1px solid #222; padding: 30px; 
      border-radius: 12px; transition: 0.3s; text-decoration: none; color: inherit;
    }
    .card:hover { border-color: var(--neon); transform: translateY(-8px); box-shadow: 0 5px 20px rgba(0, 255, 157, 0.1); }
    .card h3 { margin: 0 0 10px; font-size: 1.3rem; font-family: var(--font-header); font-weight: 700; }
    .card p { color: var(--dim-text); margin: 0; font-size: 0.95rem; }

    .btn-main {
      display: inline-block; background: var(--neon); color: #000; padding: 15px 35px;
      border-radius: 8px; text-decoration: none; font-weight: 700; transition: 0.3s;
      font-family: var(--font-header); font-size: 0.9rem; text-transform: uppercase;
    }
    .btn-main:hover { box-shadow: 0 0 30px rgba(0, 255, 157, 0.5); transform: scale(1.05); }

    /* FOOTER */
    footer { 
      padding: 50px 0; border-top: 1px solid #222; 
      color: #444; font-size: 0.8rem; text-align: center; 
      font-family: var(--font-header); 
    }
    .footer-twitter {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 14px;
      color: var(--neon); text-decoration: none;
      font-family: var(--font-header); font-weight: 700;
      font-size: 0.85rem; letter-spacing: 1px;
      border: 1px solid rgba(0, 255, 157, 0.3);
      padding: 8px 20px; border-radius: 6px;
      transition: 0.3s;
    }
    .footer-twitter:hover { 
      background: rgba(0, 255, 157, 0.08); 
      border-color: var(--neon); 
      box-shadow: 0 0 15px rgba(0, 255, 157, 0.2); 
    }
    .footer-twitter svg { width: 15px; height: 15px; fill: var(--neon); }

    @media (max-width: 850px) {
      .hero { flex-direction: column-reverse; text-align: center; padding-top: 220px; }
      .hero-content h1 { font-size: 2.2rem; }
      .profile-wrapper { width: 200px; height: 200px; margin: 0 auto; }
      .ticker-bar { padding: 10px; font-size: 0.8rem; }
      .ticker-item { margin-right: 15px; }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <header>
    <div class="ticker-bar">
      <div class="ticker-content" id="ticker-content">
        <span class="ticker-item">Carregando mercados reais do Polymarket...</span>
      </div>
    </div>
    <nav>
      <a href="#" class="logo">0xDefalt</a>
      <div class="nav-links">
        <a href="#about">Sobre</a>
        <a href="#alpha">Alpha</a>
        <a href="#links">Links</a>
      </div>
    </nav>
  </header>

  <!-- resto do main, hero, sections, footer igual ao anterior -->

  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 70 },
        "color": { "value": "#00ff9d" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5 },
        "size": { "value": 3 },
        "line_linked": { "enable": true, "color": "#00ff9d", "opacity": 0.2, "distance": 150 },
        "move": { "enable": true, "speed": 1.5 }
      },
      "interactivity": {
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" }
        },
        "modes": {
          "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }
        }
      }
    });

    // Parallax na foto
    window.addEventListener('scroll', function() {
        const scrolled = window.pageYOffset;
        const profile = document.querySelector('.profile-wrapper');
        const limit = 300; 
        if (scrolled < limit) {
            profile.style.transform = `translateY(${scrolled * 0.2}px)`;
        }
    });

    // Fetch dinâmico da Gamma API do Polymarket
    async function fetchPolymarketMarkets() {
      try {
        // Breaking News
        const breakingRes = await fetch('https://gamma-api.polymarket.com/markets?tags=breaking-news&active=true&limit=10&order_by=volume&ascending=false');
        const breakingData = await breakingRes.json();

        // Crypto
        const cryptoRes = await fetch('https://gamma-api.polymarket.com/markets?tags=crypto&active=true&limit=15&order_by=volume&ascending=false');
        const cryptoData = await cryptoRes.json();

        // Mapear pra formato simples
        const allMarkets = [
          ...breakingData.map(m => ({
            icon: '🔥',
            title: m.question || m.title || m.slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
            chance: Math.round((m.outcomes?.find(o => o.channel === 'yes')?.price || 0.5) * 100)
          })),
          ...cryptoData.map(m => ({
            icon: '💰',
            title: m.question || m.title || m.slug.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
            chance: Math.round((m.outcomes?.find(o => o.channel === 'yes')?.price || 0.5) * 100)
          }))
        ].filter(m => m.title && m.title.trim() !== ''); // Limpa vazios

        // Ordena por chance descendente (pra destacar os mais "quentes")
        allMarkets.sort((a, b) => b.chance - a.chance);

        return allMarkets.slice(0, 40); // Limita pra não ficar eterno
      } catch (err) {
        console.error('Erro na API Polymarket:', err);
        return [
          { icon: '🔥', title: 'Erro ao carregar Breaking News', chance: 0 },
          { icon: '💰', title: 'Erro ao carregar Crypto', chance: 0 }
        ];
      }
    }

    // Carrega e preenche o slider
    async function loadTicker() {
      const markets = await fetchPolymarketMarkets();
      const tickerContent = document.getElementById('ticker-content');
      tickerContent.innerHTML = ''; // Limpa loading

      markets.forEach(market => {
        const item = document.createElement('span');
        item.classList.add('ticker-item');
        const chanceClass = market.chance < 50 ? 'low-chance' : 'high-chance';
        item.innerHTML = `${market.icon} ${market.title} <span class="ticker-chance ${chanceClass}">${market.chance}% Chance</span>`;
        tickerContent.appendChild(item);
      });

      // Duplica pra loop infinito
      tickerContent.innerHTML += tickerContent.innerHTML;
    }

    // Executa ao carregar a página
    loadTicker();
  </script>

</body>
</html>
